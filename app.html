<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4a90e2">
<link rel="manifest" href="manifest.json"><title>健康管理アプリ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
font-family:sans-serif;
background:#eef6ff;
padding:15px;
max-width:600px;
margin:auto;
}
#today{
background:#e8f7ff;
padding:12px;
border-radius:10px;
margin-bottom:10px;
font-weight:bold;
}
h1{
text-align:center;
}

.box{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
font-size:16px;
border:none;
border-radius:8px;
background:#4da3ff;
color:white;
cursor:pointer;
}

button:hover{
background:#2f8cff;
}

.log{
background:#f8fbff;
padding:10px;
margin-top:10px;
border-radius:8px;
border-left:5px solid #4da3ff;
}

.today{
border-left:5px solid #00c853;
background:#f1fff5;
}

.delete{
margin-top:5px;
background:#ff5c5c;
}

.stats{
font-size:14px;
margin-bottom:10px;
}

</style>
</head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<body>

<h1>健康管理アプリ</h1>

<div class="box">
<h2>食事メモ</h2>
<input id="food" placeholder="食べたもの">

<h2>糖質メモ</h2>
<input id="carb" placeholder="少なめ・普通・多め">

<h2>運動</h2>
<input id="exercise" placeholder="ウォーキングなど">

<button onclick="save()">記録する</button>
</div>
<div class="box">
<h2>今日の状態</h2>
<div id="today"></div>
</div>
<div class="box">
<h2>統計</h2>
<div class="stats" id="stats"></div>
</div>

<div class="box">
<h2>記録</h2>
<div id="logs"></div>
</div>
<div class="box">
<h2>糖質グラフ</h2>
<canvas id="carbChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
<script>

function save(){

let food=document.getElementById("food").value;
let carb=document.getElementById("carb").value;
let exercise=document.getElementById("exercise").value;

let today=new Date().toLocaleDateString();

let log={
date:today,
food:food,
carb:carb,
exercise:exercise
};

let data=JSON.parse(localStorage.getItem("healthLogs"))||[];
data.unshift(log);
localStorage.setItem("healthLogs",JSON.stringify(data));

document.getElementById("food").value="";
document.getElementById("carb").value="";
document.getElementById("exercise").value="";

showLogs();
}

function deleteLog(index){
let data=JSON.parse(localStorage.getItem("healthLogs"))||[];
data.splice(index,1);
localStorage.setItem("healthLogs",JSON.stringify(data));
showLogs();
}

function showLogs(){


let todayBox = document.getElementById("today");
let logs = document.getElementById("logs");
let data = JSON.parse(localStorage.getItem("healthLogs")) || [];

logs.innerHTML="";

let exerciseCount=0;

data.forEach((item,index)=>{

if(item.exercise){
exerciseCount++;
}

});
    
let last = data[0];

if(last){
todayBox.innerHTML =
"食事："+last.food+"<br>"+
"糖質："+last.carb+"<br>"+
"運動："+last.exercise;
}
if(item.exercise){
exerciseCount++;
}

let today=new Date().toLocaleDateString();
let todayClass=item.date===today ? "log today" : "log";

logs.innerHTML+=`
<div class="${todayClass}">
<div><b>${item.date}</b></div>
食事：${item.food}<br>
糖質：${item.carb}<br>
運動：${item.exercise}
<button class="delete" onclick="deleteLog(${index})">削除</button>
</div>
`;

});

stats.innerHTML=
"記録数：" + data.length + "件<br>" +
"運動回数：" + exerciseCount + "回";
}

showLogs();
function showCarbGraph(){

let data=JSON.parse(localStorage.getItem("healthLogs"))||[];

let low=0;
let normal=0;
let high=0;

data.forEach(item=>{
let c=item.carb || "";

if(c.includes("少")) low++;
else if(c.includes("普通")) normal++;
else if(c.includes("多")) high++;
});

let total=low+normal+high;

if(total===0){
document.getElementById("carbGraph").innerHTML="まだデータがありません";
return;
}

document.getElementById("carbGraph").innerHTML=
"少なめ：" + "█".repeat(low) + " " + low + "<br>" +
"普通：" + "█".repeat(normal) + " " + normal + "<br>" +
"多め：" + "█".repeat(high) + " " + high;

}

showCarbGraph();
</script>

</body>
</html>
